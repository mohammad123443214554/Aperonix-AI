<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix AI - Smart Mode</title>
    <style>
        /* Modern Design - Aapke 40k laptop par makkhan chalega */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        #chat-container { 
            width: 380px; 
            background: #1e293b; 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            border: 1px solid #334155;
        }
        h3 { text-align: center; color: #3b82f6; margin-top: 0; }
        #messages { 
            height: 350px; 
            overflow-y: auto; 
            border-bottom: 1px solid #334155; 
            margin-bottom: 15px; 
            padding: 10px;
            scrollbar-width: thin;
        }
        #messages p { margin: 8px 0; line-height: 1.4; }
        .input-area { display: flex; gap: 8px; }
        input { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            background: #334155; 
            color: white; 
            outline: none;
        }
        button { 
            padding: 10px 15px; 
            border: none; 
            border-radius: 8px; 
            background: #3b82f6; 
            color: white; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
        .learn-btn { background: #10b981; }
    </style>
</head>
<body>

    <div id="chat-container">
        <h3>Veltrix AI (Smart Mode)</h3>
        <div id="messages">
            <p style="color: #94a3b8; font-size: 0.9em; text-align: center;">AI is online. Type 'hi' to start.</p>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Kuch pucho ya sikhao...">
            <button onclick="askAI()">Send</button>
        </div>
        
        <div style="margin-top: 10px; text-align: center;">
            <button class="learn-btn" onclick="activateLearnMode()" style="width: 100%;">Teach AI (Learn Mode)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
