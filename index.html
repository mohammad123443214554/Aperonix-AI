<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aperonix AI — Professional AI assistant powered by local Ollama." />
  <title>Aperonix AI</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>" />
</head>
<body>

<div class="app">

  <!-- ════════════════════════════════════════
       SIDEBAR
  ════════════════════════════════════════ -->
  <aside id="sidebar" aria-label="Sidebar navigation">

    <div class="sidebar-header">
      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <!-- If logo.png exists it shows; otherwise shows emoji fallback -->
          <img src="logo.png" alt="Aperonix Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
          <span class="fallback-icon" style="display:none">◈</span>
        </div>
        <div class="brand-text">
          <span class="brand-name">Aperonix AI</span>
          <span class="brand-tagline">by Mohammad Khan</span>
        </div>
      </div>

      <!-- New Chat -->
      <button id="new-chat-btn" aria-label="Start new conversation">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Chat
      </button>
    </div>

    <!-- History Section -->
    <div class="sidebar-section">
      <p class="sidebar-section-label">Recent</p>
    </div>

    <!-- History List -->
    <div id="history-list" role="list" aria-label="Chat history"></div>

    <!-- Ad Space Sidebar -->
    <!-- Ad Space Sidebar -->
    <div class="ad-sidebar">
      <div class="ad-placeholder">
        <!-- Ad Space Sidebar -->
        Ad Space · 160×90
      </div>
    </div>

  </aside>

  <!-- ════════════════════════════════════════
       MAIN CONTENT
  ════════════════════════════════════════ -->
  <div class="main">

    <!-- Ad Space Top -->
    <div class="ad-top" aria-hidden="true">
      <div class="ad-placeholder" style="max-width:728px;width:100%">
        <!-- Ad Space Top -->
        Ad Space Top · 728×50
      </div>
    </div>

    <!-- Header -->
    <header>
      <button id="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="header-center">
        <div class="dot" title="Ollama connected"></div>
        <span><strong>Aperonix AI</strong> · llama3</span>
      </div>

      <div class="header-right">
        <span class="model-badge">Local · Ollama</span>
      </div>
    </header>

    <!-- Chat Messages -->
    <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat conversation">

      <!-- Welcome Screen -->
      <div id="welcome-screen">
        <div class="welcome-logo">◈</div>
        <h1><span>Aperonix</span> AI</h1>
        <p>Your local AI assistant powered by Ollama.<br>Completely private — runs on your machine.</p>

        <div class="suggestions" role="list" aria-label="Suggested prompts">
          <button class="suggestion-chip" data-prompt="Who are you?">Who are you?</button>
          <button class="suggestion-chip" data-prompt="Write a Python function to reverse a linked list">Write me some code</button>
          <button class="suggestion-chip" data-prompt="Explain machine learning in simple terms">Explain ML simply</button>
          <button class="suggestion-chip" data-prompt="What are your capabilities?">What can you do?</button>
        </div>
      </div>

    </div><!-- end #chat-messages -->

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-container" role="group" aria-label="Message input">
        <textarea
          id="user-input"
          rows="1"
          maxlength="4000"
          placeholder="Message Aperonix AI…"
          aria-label="Type your message here"
          autocomplete="off"
          spellcheck="true"
        ></textarea>

        <button id="send-btn" disabled title="Send message (Enter)" aria-label="Send message">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <div class="input-footer">
        <span id="char-count" aria-live="polite">0/4000</span>
        <span class="footer-hint">Enter ↵ to send · Shift+Enter for newline</span>
      </div>
    </div>

    <!-- Ad Space Bottom -->
    <div class="ad-bottom" aria-hidden="true">
      <div class="ad-placeholder" style="max-width:728px;width:100%">
        <!-- Ad Space Bottom -->
        Ad Space Bottom · 728×50
      </div>
    </div>

  </div><!-- end .main -->

</div><!-- end .app -->

<!-- Scripts -->
<script src="systemprompt.js"></script>
<script src="script.js"></script>

</body>
</html>
