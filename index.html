<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperonix AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="night">

<nav class="navbar">
    <div class="nav-left">
        <img src="logo.png" class="logo" id="mainLogo">
        <span>Aperonix AI</span>
    </div>
    <div class="nav-right">
        <a href="index.html">Chat</a>
        <a href="image.html">Image</a>
        <a href="about.html">About</a>
    </div>
</nav>

<div class="container">
    <aside class="sidebar">
        <button id="newChatBtn">+ New Chat</button>
        <div class="chat-history" id="chatHistory"></div>
        <button class="settings-btn" id="openSettings">Settings</button>
    </aside>

    <main class="chat-area">
        <div id="welcomeScreen" class="welcome">
            <h1>HELLO! I'M APERONIX</h1>
        </div>

        <div id="chatContainer" class="chat-container"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask anything...">
            <button id="sendBtn">Send</button>
        </div>
    </main>
</div>

<!-- SETTINGS MODAL -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h2>Settings</h2>

        <label>Gemini API Key</label>
        <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key">
        <button id="saveApiKey">Save Key</button>

        <h3>Themes</h3>
        <div class="theme-options">
            <button data-theme="aquatic">Aquatic Mode</button>
            <button data-theme="desert">Desert Mode</button>
            <button data-theme="dusk">Dusk Mode</button>
            <button data-theme="night">Night Sky Mode</button>
        </div>

        <button id="closeSettings">Close</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
