<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veltrix AI - My Own Creation</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 350px; background: #1e293b; border-radius: 10px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #messages { height: 300px; overflow-y: auto; border-bottom: 1px solid #334155; margin-bottom: 10px; padding: 5px; }
        input { width: 80%; padding: 10px; border: none; border-radius: 5px; background: #334155; color: white; }
        button { padding: 10px; border: none; border-radius: 5px; background: #3b82f6; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <h3>Veltrix AI (Self-Made)</h3>
    <div id="messages"></div>
    <input type="text" id="userInput" placeholder="Kuch pucho...">
    <button onclick="askAI()">Send</button>
</div>

<script>
    // Ye hai aapka chota sa AI Dimaag (Brain)
    // Aap is list mein jitne sawal-jawab daaloge, AI utna smart lagega
    const knowledgeBase = {
        "hi": "Hello bhai! Kaise ho?",
        "kaise ho": "Main ekdam badhiya hoon, aap batao?",
        "kaun ho": "Main Veltrix AI hoon, mujhe 14 saal ke ek super developer ne banaya hai!",
        "veltrix kya hai": "Veltrix ek powerful IDE hai jo coding ko aasaan banati hai.",
        "bye": "Alvida bhai! Phir milenge."
    };

    function askAI() {
        const input = document.getElementById("userInput").value.toLowerCase();
        const chatBox = document.getElementById("messages");
        
        // User ka message dikhana
        chatBox.innerHTML += `<p><b>Aap:</b> ${input}</p>`;
        
        // AI ka dimaag lagana
        let response = "Hmm... mujhe iska jawab nahi pata, par main seekh raha hoon!";
        
        for (let key in knowledgeBase) {
            if (input.includes(key)) {
                response = knowledgeBase[key];
                break;
            }
        }
        
        // AI ka jawab dikhana
        setTimeout(() => {
            chatBox.innerHTML += `<p style="color: #3b82f6;"><b>AI:</b> ${response}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 500);

        document.getElementById("userInput").value = "";
    }
</script>

</body>
</html>
