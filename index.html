<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aperonix AI — Your intelligent assistant created by Mohammad Khan." />
  <meta name="theme-color" content="#0d0d0f" />

  <title>Aperonix AI</title>

  <!-- Favicon (inline SVG as data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236fb3f7'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>A</text></svg>" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">

    <!-- ── Header ──────────────────────────────────────────────────────────── -->
    <header>
      <div class="header-brand">
        <div class="header-logo">A</div>
        <div>
          <div class="header-title">Aperonix AI</div>
          <div class="header-subtitle">by Mohammad Khan</div>
        </div>
      </div>

      <div class="header-actions">
        <div class="status-badge">
          <span class="status-dot"></span>
          <span>Online</span>
        </div>
        <button id="clear-btn" title="Clear chat history">Clear chat</button>
      </div>
    </header>

    <!-- ── Chat Messages ────────────────────────────────────────────────────── -->
    <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages">
      <!-- Messages are injected by script.js -->
    </div>

    <!-- ── Input Area ───────────────────────────────────────────────────────── -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          placeholder="Message Aperonix…"
          rows="1"
          maxlength="2000"
          aria-label="Type your message"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="send-btn" disabled title="Send message" aria-label="Send">
          <span class="send-icon">↑</span>
        </button>
      </div>
      <div class="input-meta">
        <span class="input-hint">Press Enter to send · Shift+Enter for new line</span>
        <span id="char-count">0 / 2000</span>
      </div>
      <p class="footer-note">
        Aperonix AI · Created by Mohammad Khan · Placeholder mode active
      </p>
    </div>

  </div><!-- /#app -->

  <!-- Scripts (order matters) -->
  <script src="memory.js"></script>
  <script src="script.js"></script>

</body>
</html>
