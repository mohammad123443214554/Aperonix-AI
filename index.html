
---

### 2️⃣ HTML FILES

#### `index.html` (Chat Interface)
```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperonix AI - Chat</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button id="new-chat-btn" class="new-chat-btn">
                <span class="material-icons">add</span> New Chat
            </button>
        </div>
        
        <div class="chat-history-container">
            <h3>History</h3>
            <ul id="chat-history-list">
                <!-- History items injected via JS -->
            </ul>
        </div>

        <div class="sidebar-footer">
            <button id="settings-btn" class="sidebar-btn">
                <span class="material-icons">settings</span> Settings
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <div class="nav-left">
                <img src="logo.png" alt="Logo" class="nav-logo" onerror="this.src='https://placehold.co/50x50/222/fff?text=A'">
                <span class="brand-name">Aperonix AI</span>
            </div>
            <div class="nav-right">
                <a href="index.html" class="nav-link active">Chat</a>
                <a href="image.html" class="nav-link">Image</a>
                <a href="about.html" class="nav-link">About</a>
            </div>
        </nav>

        <!-- Chat Container -->
        <div class="chat-container" id="chat-container">
            <div class="welcome-screen" id="welcome-screen">
                <h1>HELLO! I'M APERONIX</h1>
                <p>How can I help you today?</p>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <!-- Messages injected here -->
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Message Aperonix..." autocomplete="off">
                <button id="send-btn">
                    <span class="material-icons">send</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Settings</h2>
            
            <div class="setting-group">
                <label>Gemini API Key</label>
                <input type="password" id="api-key-input" placeholder="Enter your API Key">
                <small>Your key is stored locally in your browser.</small>
            </div>

            <div class="setting-group">
                <label>Theme Mode</label>
                <div class="theme-options">
                    <div class="theme-btn" data-theme="aquatic" style="background: #00bcd4;"></div>
                    <div class="theme-btn" data-theme="desert" style="background: #ff9800;"></div>
                    <div class="theme-btn" data-theme="dusk" style="background: #9c27b0;"></div>
                    <div class="theme-btn active" data-theme="night" style="background: #121212; border: 1px solid #fff;"></div>
                </div>
            </div>

            <button id="save-settings-btn" class="primary-btn">Save Settings</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
