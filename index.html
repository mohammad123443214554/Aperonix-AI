<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix AI - Global Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; background: #1e293b; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h3 { text-align: center; color: #3b82f6; margin-bottom: 20px; }
        #messages { height: 350px; overflow-y: auto; margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #334155; scroll-behavior: smooth; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #334155; color: white; outline: none; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        .bot-msg { color: #3b82f6; margin: 10px 0; }
        .user-msg { color: #f8fafc; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="chat-container">
        <h3>Veltrix AI v2.0</h3>
        <div id="messages">
            <p style="text-align:center; color:#64748b;">System: Data loaded from cloud/local JSON.</p>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask me something...">
            <button onclick="askAI()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
