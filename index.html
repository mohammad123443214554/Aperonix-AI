<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aperonix AI — A next-generation AI assistant powered by Google Gemini. Chat, create, and explore with cutting-edge artificial intelligence." />
  <meta name="keywords" content="AI chat, Gemini AI, artificial intelligence, Aperonix, chatbot, AI assistant" />
  <meta name="author" content="Aperonix AI" />
  <meta property="og:title" content="Aperonix AI — Intelligent Conversations" />
  <meta property="og:description" content="Chat with a powerful AI assistant powered by Google Gemini." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Aperonix AI — Intelligent Conversations</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- AdSense Script Placeholder -->
  <!-- REPLACE ca-pub-XXXXXXXXXXXXXXXX with your actual AdSense Publisher ID -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Top Banner Ad Placement -->
  <!-- ADSENSE PLACEMENT: Top Banner (728x90 leaderboard) -->
  <div class="ad-banner-top" aria-label="Advertisement">
    <!-- 
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="XXXXXXXXXX"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
  </div>

  <div class="app-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-mark">⬡</span>
          <span class="logo-text">Aperonix</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn" aria-label="New Chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Chat
        </button>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html" class="nav-link active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Chat
        </a>
        <a href="image.html" class="nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Image Gen
        </a>
        <a href="about.html" class="nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          About
        </a>
      </nav>

      <!-- Sidebar Ad Placement -->
      <!-- ADSENSE PLACEMENT: Sidebar (300x250 medium rectangle) -->
      <div class="ad-sidebar" aria-label="Advertisement">
        <!--
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
               data-ad-slot="XXXXXXXXXX"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        -->
      </div>

      <div class="sidebar-footer">
        <span>Powered by Gemini</span>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="main-content">
      <header class="chat-header">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="chat-title">Aperonix AI</h1>
        <div class="header-badge">GEMINI</div>
      </header>

      <!-- Messages Area -->
      <div class="messages-container" id="messagesContainer" role="log" aria-live="polite" aria-label="Chat messages">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">⬡</div>
          <h2 class="welcome-title">Aperonix AI</h2>
          <p class="welcome-subtitle">Powered by Google Gemini. Ask anything, create anything.</p>
          <div class="suggestion-grid">
            <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
              <span class="suggestion-icon">🔬</span>
              <span>Explain quantum computing</span>
            </button>
            <button class="suggestion-card" data-prompt="Write a Python script to sort a list of dictionaries by a key">
              <span class="suggestion-icon">💻</span>
              <span>Write a Python script</span>
            </button>
            <button class="suggestion-card" data-prompt="What are the best practices for modern web development in 2025?">
              <span class="suggestion-icon">🌐</span>
              <span>Web dev best practices</span>
            </button>
            <button class="suggestion-card" data-prompt="Give me 5 creative marketing ideas for a SaaS product">
              <span class="suggestion-icon">💡</span>
              <span>Marketing ideas for SaaS</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-container">
          <textarea
            id="userInput"
            class="chat-input"
            placeholder="Message Aperonix AI..."
            rows="1"
            aria-label="Type your message"
          ></textarea>
          <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
        <p class="input-disclaimer">Aperonix AI may produce inaccurate information. Verify important facts.</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
