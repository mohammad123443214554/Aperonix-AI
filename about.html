<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Aperonix | Mohammad Khan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #050505; color: white; overflow: hidden; }

        /* FULL SCREEN BACKGROUND */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* YAHA CHECK KAREIN: bg-image.png sahi hona chahiye */
            background: linear-gradient(to right, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.1) 100%), 
                        url('./bg-image.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        .main-wrapper { height: 100vh; display: flex; align-items: center; padding: 0 8%; }
        .info-content { max-width: 600px; animation: fadeInUp 1s ease-out; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 4.5rem; margin-bottom: 15px; background: linear-gradient(to right, #fff, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        p { font-size: 1.1rem; line-height: 1.8; color: #bdc3c7; margin-bottom: 35px; }

        .founder-box {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            padding: 25px; border-left: 4px solid #00d2ff; border-radius: 0 15px 15px 0; margin-bottom: 30px;
        }
        .founder-box h2 { font-size: 1.7rem; color: #fff; }
        .founder-box .role { color: #00d2ff; font-weight: 600; font-size: 0.9rem; }

        .btn-return {
            display: inline-block; padding: 12px 40px; background: #00d2ff; color: #00;
            text-decoration: none; border-radius: 4px; font-weight: 800; transition: 0.3s;
        }
        .btn-return:hover { background: #fff; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <div class="main-wrapper">
        <div class="info-content">
            <span style="color:#00d2ff; letter-spacing:3px; font-weight:bold;">SYSTEM OVERVIEW</span>
            <h1>Aperonix AI</h1>
            <p>Aperonix is a high-performance neural architecture built to empower creators. Engineered for precision, it bridges the gap between human intuition and machine processing.</p>

            <div class="founder-box">
                <h2>Mohammad Khan</h2>
                <span class="role">Founder & Chief Architect</span>
                <p style="margin-top: 5px; font-size: 0.8rem; color: #666;">ESTABLISHED 2026</p>
            </div>

            <a href="index.html" class="btn-return">← Back to Dashboard</a>
        </div>
    </div>

</body>
</html>
