<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Aperonix</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0b0e14; margin: 0; font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px;
            border-radius: 24px; text-align: center; max-width: 450px; width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h1 { color: #00d2ff; font-size: 2.2rem; margin-bottom: 10px; }
        .creator { color: #888; margin-bottom: 30px; font-size: 0.9rem; letter-spacing: 1px; }
        .feature-box {
            text-align: left; background: rgba(0,0,0,0.2);
            padding: 20px; border-radius: 15px; margin-bottom: 25px;
        }
        .feature-box p { color: #ccc; font-size: 0.95rem; margin: 8px 0; display: flex; align-items: center; gap: 10px; }
        .back-btn {
            display: inline-block; background: #00d2ff; color: #000;
            text-decoration: none; padding: 12px 30px; border-radius: 12px;
            font-weight: bold; transition: 0.3s;
        }
        .back-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>Aperonix AI</h1>
        <p class="creator">BY <strong>[Mohammad khan]</strong></p>
        
        <div class="feature-box">
            <p>🚀 <strong>Fast:</strong> Real-time AI responses.</p>
            <p>🎨 <strong>Creative:</strong> Professional Image generation.</p>
            <p>🔒 <strong>Secure:</strong> Encrypted API key storage.</p>
        </div>

        <a href="index.html" class="back-btn">← Back to Chat</a>
    </div>
</body>
</html>
